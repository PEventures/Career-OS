packages:
  "framer-motion": "For premium, smooth page transitions and micro-interactions"
  "recharts": "For the dashboard analytics and brand score visualizations"
  "lucide-react": "For beautiful, consistent iconography"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging Tailwind classes safely"
  "@hookform/resolvers": "Zod integration for react-hook-form"
  "react-hook-form": "Performant, flexible and extensible forms with easy-to-use validation"
  "zod": "Schema validation for forms"
  "date-fns": "For formatting dates in the Journey and Dashboard"

images:
  - path: "artifacts/standout-manager/public/images/hero-abstract.png"
    description: "Deep navy and slate dark background with subtle, elegant glowing amber and gold abstract geometric lines. Sophisticated, corporate, premium, minimalistic, hinting at leadership and strategy."
    aspect_ratio: "16:9"
  - path: "artifacts/standout-manager/public/images/auth-bg.png"
    description: "Very dark, moody architectural office space out of focus, with a soft warm light illuminating a sleek surface. Premium, secretive, professional."
    aspect_ratio: "9:16"

notes:
  - Uses @workspace/api-client-react for all REST API calls.
  - Authentication token is stored in localStorage as 'standout_token'.
  - AI Coach streaming requires manual fetch implementation to handle SSE properly.
  - The design aesthetic is 'Dark Premium': Deep navies (#0B0F19), slates, with amber/gold accents (#FBBF24).
